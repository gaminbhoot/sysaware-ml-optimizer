version: '3.8'

services:
  ml-optimizer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - ENV=production
      - SYSAWARE_BIND=0.0.0.0
      - SYSAWARE_API_KEY=prod_api_key_placeholder_change_me
      - SYSAWARE_ADMIN_KEY=prod_admin_key_placeholder_change_me
    restart: unless-stopped
